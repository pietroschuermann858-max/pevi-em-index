    .a11y-fab {

      display: flex;

      gap: 0.4rem;

    .a11y-fab-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563EB, #10B981);

      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 6px 24px rgba(37,99,235,0.45);
      transition: transform 0.2s, box-shadow 0.2s;

    }

      50%      { box-shadow: 0 6px 32px rgba(37,99,235,0.75), 0 0 0 8px rgba(37,99,235,0.12); }
    }

      color: var(--text);

      text-align: center;
